{% extends 'base.html' %}
{% block content %}
<h1>註冊帳號</h1>
<form method="POST">
    {% csrf_token %}
    <p>帳號：<input type="text" name="username"></p>
    <p>密碼：<input type="password" name="password"></p>
    <p>確認密碼：<input type="password" name="password2"></p>
    <button type="submit">註冊</button>
</form>
<p>已有帳號？<a href="/login/">點此登入</a></p>
{% endblock %}
